# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: bcbg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bcbg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bcbg_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bcbg_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bcbg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bcbg} -d ${POSTGRES_DB:-bcbg_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bcbg_postgres_data:
